services:
  # Backend: Express + Socket.IO
  - type: web
    name: ai-dixit-server
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm --filter @ai-dixit/shared build && pnpm --filter @ai-dixit/server build
    startCommand: node packages/server/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # Frontend: Next.js
  - type: web
    name: ai-dixit-web
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm --filter @ai-dixit/shared build && pnpm --filter @ai-dixit/web build
    startCommand: cd packages/web && npx next start -p $PORT
    envVars:
      - key: NEXT_PUBLIC_SERVER_URL
        sync: false
      - key: NODE_ENV
        value: production
